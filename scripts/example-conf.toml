# ZeroClaw — full configuration reference (`Config` in `src/config/schema.rs`)
#
# Copy to ~/.zeroclaw/config.toml (e.g. Raspberry Pi production). deploy-rpi.sh can do this.
# API keys: prefer ~/.zeroclaw/.env (e.g. ANTHROPIC_API_KEY) or provider-specific env vars.
# This file lists every top-level section the binary deserializes; omit any section to use defaults.

# ── Provider (top-level) ─────────────────────────────────────────
# api_key = ""
# api_url = "http://127.0.0.1:11434"
# api_path = "/v1/chat/completions"
default_provider = "anthropic-custom:https://api.z.ai/api/anthropic"
default_model = "claude-3-5-sonnet-20241022"
default_temperature = 0.4
provider_timeout_secs = 120

# [extra_headers]
# X-Title = "my-app"

# Named OpenAI-compatible profiles (optional):
# [model_providers.my-ollama]
# name = "ollama"
# base_url = "http://127.0.0.1:11434"
# api_path = "/v1/chat/completions"
# wire_api = "chat_completions"
# requires_openai_auth = false
# azure_openai_resource = ""
# azure_openai_deployment = ""
# azure_openai_api_version = "2024-08-01-preview"

# ── Model / embedding routing ───────────────────────────────────
# [[model_routes]]
# hint = "fast"
# provider = "openrouter"
# model = "meta-llama/llama-3.3-70b-instruct"
# api_key = ""

# [[embedding_routes]]
# hint = "semantic"
# provider = "openai"
# model = "text-embedding-3-small"
# dimensions = 1536
# api_key = ""

locale = "en"

# ── Observability ───────────────────────────────────────────────
[observability]
backend = "none"
otel_endpoint = "http://localhost:4318"
otel_service_name = "zeroclaw"
runtime_trace_mode = "none"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 200

# ── Autonomy ────────────────────────────────────────────────────
[autonomy]
level = "full"
workspace_only = false
allowed_commands = [
    "git", "npm", "cargo", "mkdir", "touch", "cp", "mv", "ls", "cat", "grep", "find",
    "echo", "pwd", "wc", "head", "tail", "date",
]
forbidden_paths = [
    "/etc", "/root", "/home", "/usr", "/bin", "/sbin", "/lib", "/opt", "/boot",
    "/dev", "/proc", "/sys", "/var", "/tmp", "/mnt",
    "~/.ssh", "~/.gnupg", "~/.aws", "~/.config",
]
max_actions_per_hour = 100
max_cost_per_day_cents = 1000
require_approval_for_medium_risk = true
block_high_risk_commands = true
shell_env_passthrough = []
auto_approve = ["file_read", "memory_recall"]
always_ask = []
allowed_roots = []
non_cli_excluded_tools = [
    "shell", "process", "file_write", "file_edit", "git_operations",
    "browser", "browser_open", "http_request", "schedule",
    "cron_add", "cron_remove", "cron_update", "cron_run",
    "memory_store", "memory_forget", "proxy_config", "web_search_config",
    "web_access_config", "model_routing_config", "channel_ack_config",
    "pushover", "composio", "delegate", "screenshot", "image_info",
]

# ── Security ────────────────────────────────────────────────────
[security.sandbox]
enabled = true
backend = "auto"
firejail_args = []

[security.resources]
max_memory_mb = 512
max_cpu_time_seconds = 60
max_subprocesses = 10
memory_monitoring = true

[security.audit]
enabled = true
log_path = "audit.log"
max_size_mb = 100
sign_events = false

[security.otp]
enabled = true
method = "totp"
token_ttl_secs = 30
cache_valid_secs = 300
gated_actions = ["shell", "file_write", "browser_open", "browser", "memory_forget"]
gated_domains = []
gated_domain_categories = []
challenge_max_attempts = 3

[security.estop]
enabled = false
state_file = "~/.zeroclaw/estop-state.json"
require_otp_to_resume = true

[security.nevis]
enabled = false
instance_url = ""
realm = "master"
client_id = ""
client_secret = ""
token_validation = "local"
jwks_url = ""
role_mapping = []
require_mfa = false
session_timeout_secs = 3600

# ── Backup & data retention ─────────────────────────────────────
[backup]
enabled = true
max_keep = 10
include_dirs = ["config", "memory", "audit", "knowledge"]
destination_dir = "state/backups"
schedule_cron = ""
schedule_timezone = ""
compress = true
encrypt = false

[data_retention]
enabled = false
retention_days = 90
dry_run = false
categories = []

# ── Cloud ops & conversational AI (reserved) ────────────────────
[cloud_ops]
enabled = false
default_cloud = "aws"
supported_clouds = ["aws", "azure", "gcp"]
iac_tools = ["terraform"]
cost_threshold_monthly_usd = 100.0
well_architected_frameworks = ["aws-waf"]

[conversational_ai]
enabled = false
default_language = "en"
supported_languages = ["en", "de", "fr", "it"]
auto_detect_language = true
escalation_confidence_threshold = 0.3
max_conversation_turns = 50
conversation_timeout_secs = 1800
analytics_enabled = false
knowledge_base_tool = ""

[security_ops]
enabled = false
playbooks_dir = "~/.zeroclaw/playbooks"
auto_triage = false
require_approval_for_actions = true
max_auto_severity = "low"
report_output_dir = "~/.zeroclaw/security-reports"
siem_integration = ""

# ── Runtime & reliability ───────────────────────────────────────
[runtime]
kind = "native"
# reasoning_enabled = true
# reasoning_effort = "medium"

[runtime.docker]
image = "alpine:3.20"
network = "none"
memory_limit_mb = 512
cpu_limit = 1.0
read_only_rootfs = true
mount_workspace = true
allowed_workspace_roots = []

[reliability]
provider_retries = 2
provider_backoff_ms = 500
fallback_providers = []
api_keys = []
channel_initial_backoff_secs = 2
channel_max_backoff_secs = 60
scheduler_poll_secs = 15
scheduler_retries = 2

# [reliability.model_fallbacks]
# "anthropic/claude-opus-4-20250514" = ["anthropic/claude-sonnet-4-20250514"]

[scheduler]
enabled = true
max_tasks = 64
max_concurrent = 4

# ── Agent & pacing ──────────────────────────────────────────────
[agent]
compact_context = true
max_tool_iterations = 20
max_history_messages = 50
max_context_tokens = 32000
parallel_tools = false
tool_dispatcher = "auto"
tool_call_dedup_exempt = []
tool_filter_groups = []
max_system_prompt_chars = 0
session_archive_retention_days = 0

[agent.thinking]
default_level = "medium"

[agent.history_pruning]

[agent.eval]

[agent.dynamic_context]

[agent.tool_result_offload]

[agent.session_transcript]
enabled = false
max_content_chars = 0

[agent.tool_router]
enabled = false
base_url = ""
model = ""
max_tools = 10
temperature = 0.1
timeout_ms = 800
fallback_to_all_tools = true
api_key = ""
always_include = []

[pacing]
step_timeout_secs = 120
loop_detection_min_elapsed_secs = 0
loop_ignore_tools = []
message_timeout_scale_max = 4
loop_detection_enabled = true
loop_detection_window_size = 20
loop_detection_max_repeats = 3

# ── Skills ──────────────────────────────────────────────────────
[skills]
open_skills_enabled = false
open_skills_dir = ""
allow_scripts = false
prompt_injection_mode = "full"

[skills.skill_creation]
enabled = false
max_skills = 500
similarity_threshold = 0.85

# ── Classification & heartbeat ────────────────────────────────
[query_classification]
enabled = false
rules = []

[heartbeat]
enabled = false
interval_minutes = 10
two_phase = true
message = ""
target = ""
to = ""
adaptive = false
min_interval_minutes = 5
max_interval_minutes = 120
deadman_timeout_minutes = 0
deadman_channel = ""
deadman_to = ""
max_run_history = 100
load_session_context = false

# ── Cron ────────────────────────────────────────────────────────
[cron]
enabled = true
catch_up_on_startup = true
max_run_history = 50
jobs = []

# [[cron.jobs]]
# id = "nightly"
# name = "Nightly task"
# job_type = "shell"
# schedule = { kind = "cron", expr = "0 3 * * *", tz = "UTC" }
# command = "echo hello"
# enabled = true

# ── Channels ────────────────────────────────────────────────────
[channels_config]
cli = true
message_timeout_secs = 300
ack_reactions = true
show_tool_calls = false
session_persistence = true
session_backend = "sqlite"
session_ttl_hours = 0

[channels_config.webhook]
port = 8080
listen_path = "/webhook"
send_url = ""
send_method = "POST"
auth_header = ""
secret = "mytoken123"

# ── Memory & storage ────────────────────────────────────────────
[memory]
backend = "sqlite"
auto_save = true
hygiene_enabled = true
archive_after_days = 7
purge_after_days = 30
conversation_retention_days = 30
embedding_provider = "none"
embedding_model = "text-embedding-3-small"
embedding_dimensions = 1536
vector_weight = 0.7
keyword_weight = 0.3
min_relevance_score = 0.4
embedding_cache_size = 10000
chunk_max_tokens = 512
response_cache_enabled = false
response_cache_ttl_minutes = 60
response_cache_max_entries = 5000
response_cache_hot_entries = 256
snapshot_enabled = false
snapshot_on_hygiene = false
auto_hydrate = true
retrieval_stages = ["cache", "fts", "vector"]
rerank_enabled = false
rerank_threshold = 5
fts_early_return_score = 0.85
default_namespace = "default"
conflict_threshold = 0.85
audit_enabled = false
audit_retention_days = 30
sqlite_open_timeout_secs = 300

[memory.policy]
max_entries_per_namespace = 0
max_entries_per_category = 0
read_only_namespaces = []

[memory.qdrant]
url = ""
collection = "zeroclaw_memories"
api_key = ""

[storage.provider.config]
provider = ""
db_url = ""
schema = "public"
table = "memories"
connect_timeout_secs = 30
pgvector_enabled = false
pgvector_dimensions = 1536

# ── Tunnel & gateway ────────────────────────────────────────────
[tunnel]
provider = "none"

[gateway]
port = 8080
host = "0.0.0.0"
require_pairing = false
allow_public_bind = true
paired_tokens = []
pair_rate_limit_per_minute = 10
webhook_rate_limit_per_minute = 60
trust_forwarded_headers = false
path_prefix = ""
rate_limit_max_keys = 10000
idempotency_ttl_secs = 300
idempotency_max_keys = 10000
session_persistence = true
session_ttl_hours = 0

[gateway.pairing_dashboard]
code_length = 8
code_ttl_secs = 3600
max_pending_codes = 3
max_failed_attempts = 5
lockout_secs = 300

